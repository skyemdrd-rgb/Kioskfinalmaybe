<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#edf1f5;
}

#app{
  position:fixed;
  width:3840px;
  height:2160px;
  transform-origin:top left;
  overflow:hidden;
}

#loader{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
  z-index:99999;
}

.screen{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

.background,
.video-bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.background{
  background-size:cover;
  background-position:center;
}

.video-bg{
  object-fit:cover;
}

.hotspot{
  position:absolute;
  z-index:10;
  cursor:pointer;
}

body.debug .hotspot{
  background:rgba(255,0,0,.15);
  border:2px dashed red;
}

/* HOTSPOTS */

.startHotspot{
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.home{
  left:14%;
  width:21.67%;
  height:23.67%;
  bottom:0;
}

.guide{
  left:38.3%;
  width:25.32%;
  height:23.67%;
  bottom:0;
}

.about{
  left:64.2%;
  width:24.32%;
  height:23.67%;
  bottom:0;
}

.clinic{
  top:4%;
  left:6%;
  width:31%;
  height:22%;
}

.chaplain{
  top:4%;
  left:42%;
  width:30%;
  height:22%;
}

.resto{
  top:32%;
  left:40.5%;
  width:32%;
  height:18%;
}

.dept{
  top:54.7%;
  left:6%;
  width:31.5%;
  height:21.2%;
}

.mapBtn{
  bottom:3%;
  left:5%;
  width:67%;
  height:18%;
}

.aboutSide{
  top:6%;
  right:0%;
  width:11.5%;
  height:28.33%;
}

.guideSide{
  top:36%;
  right:0%;
  width:11.5%;
  height:28.33%;
}

.homeSide{
  top:65.66%;
  right:0%;
  width:11.5%;
  height:28.33%;
}

.backHome{
  bottom:7%;
  right:0%;
  width:10.5%;
  height:16%;
}

/* MAP */

.container{
  width:100%;
  height:100%;
  display:flex;
}

.sidebar{
  width:620px;
  background:white;
  border-right:2px solid #dbe2ea;
  display:flex;
  flex-direction:column;
}

.header{
  background:#0d3b8f;
  color:white;
  padding:35px;
}

.header h1{
  font-size:38px;
}

.header p{
  margin-top:10px;
  color:#d7e5ff;
}

.sidebar-content{
  padding:24px;
  overflow-y:auto;
  flex:1;
}

.destination{
  background:white;
  border:2px solid #dbe2ea;
  padding:32px;
  border-radius:32px;
  margin-bottom:24px;
  cursor:pointer;
  font-weight:bold;
  font-size:48px;
  transition:.2s;
}

.destination:hover{
  background:#0d3b8f;
  color:white;
}

.map-area{
  flex:1;
  position:relative;
  padding:42px;
}

.top-bar{
  position:absolute;
  top:34px;
  right:34px;
  background:white;
  padding:18px 26px;
  border-radius:48px;
  display:flex;
  align-items:center;
  gap:20px;
  z-index:20;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.switch-btn{
  border:none;
  background:#0d3b8f;
  color:white;
  padding:16px 24px;
  border-radius:32px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.map-container{
  width:100%;
  height:100%;
  background:white;
  border-radius:38px;
  overflow:hidden;
  position:relative;
  padding:18px;
}

.map-container img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.floor-sidebar{
  position:absolute;
  right:48px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:20px;
  z-index:30;
}

.floor-btn{
  width:150px;
  height:150px;
  border:none;
  border-radius:32px;
  background:rgba(255,255,255,0.96);
  color:#0d3b8f;
  font-size:52px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

.marker{
  position:absolute;
  width:26px;
  height:26px;
  background:red;
  border-radius:50%;
  border:5px solid white;
  transform:translate(-50%,-50%);
  box-shadow:0 0 0 12px rgba(255,0,0,0.25);
  display:none;
  z-index:50;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{ transform:translate(-50%,-50%) scale(1); }
  50%{ transform:translate(-50%,-50%) scale(1.2); }
  100%{ transform:translate(-50%,-50%) scale(1); }
}

  <div class="hotspot guideSide" onclick="goGuide()"></div>
  <div class="hotspot homeSide" onclick="goHome()"></div>

</div>

<!-- MAP -->

<div id="mapScreen" class="screen">

  <div class="container">

    <aside class="sidebar">

      <div class="header">
        <h1>Hospital Directory</h1>
        <p>Interactive Kiosk Navigation</p>
      </div>

      <div class="sidebar-content" id="destinations"></div>

    </aside>

    <main class="map-area">

      <div class="top-bar">
        <button class="switch-btn" onclick="goGuide()">Back</button>

        <button class="switch-btn" onclick="switchMap()">Switch Building</button>

        <img id="mapImage" src="msc-map.png">

        <div id="marker" class="marker"></div>

      </div>

      <div class="floor-sidebar">
        <button class="floor-btn" onclick="changeFloor(1)">1F</button>
        <button class="floor-btn" onclick="changeFloor(2)">2F</button>
        <button class="floor-btn" onclick="changeFloor(3)">3F</button>
        <button class="floor-btn" id="floor4" onclick="changeFloor(4)">4F</button>
      </div>

    </main>

  </div>

</div>

</div>

<script>

window.addEventListener('load', ()=>{

  const app = document.getElementById('app');
  const loader = document.getElementById('loader');
  const screens = document.querySelectorAll('.screen');

  /* =========================
     4K RESPONSIVE SCALE
  ========================= */

  function scaleApp(){

    const baseWidth = 3840;
    const baseHeight = 2160;

    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;

    const scaleX = windowWidth / baseWidth;
    const scaleY = windowHeight / baseHeight;

    const scale = Math.min(scaleX, scaleY);

    app.style.width = baseWidth + 'px';
    app.style.height = baseHeight + 'px';

    app.style.transform = `scale(${scale})`;
    app.style.transformOrigin = 'top left';

    const scaledWidth = baseWidth * scale;
    const scaledHeight = baseHeight * scale;

    app.style.left =
      ((windowWidth - scaledWidth) / 2) + 'px';

    app.style.top =
      ((windowHeight - scaledHeight) / 2) + 'px';
  }

  scaleApp();

  window.addEventListener('resize', scaleApp);

  /* =========================
     SCREEN NAVIGATION
  ========================= */

  window.showScreen = function(id){

    screens.forEach(screen=>{
      screen.classList.remove('active');
    });

    const target = document.getElementById(id);

    if(target){
      target.classList.add('active');
    }
  };

  window.goHome = function(){
    showScreen('homeScreen');
  };

  window.goGuide = function(){
    showScreen('guideScreen');
  };

  /* =========================
     MAP SYSTEM
  ========================= */

  const mapImage = document.getElementById('mapImage');
  const marker = document.getElementById('marker');
  const destinations = document.getElementById('destinations');

  let currentMap = 'new';
  let currentFloor = 1;

  const floors = {

    old: {

      1: {
        image: 'old-building-map.png',
        destinations: [

          ['Dietary',34,31],
          ['Purchasing Office',39,10],
          ['ER',14,74],
          ['OPD',22,87],
          ['Chapel',39,69],
          ['Laboratory',42,49],
          ['Drug Testing Lab',35,48],
          ['Medical Social Service',18,60],
          ['Medical Imaging',25,58],
          ['Pharmacy',49,76],
          ['Admin Office',34,88],
          ['Business Office',47,88],
          ['MIS',61,18],
          ['HR Office',61,38],
          ['Training Room',70,18],
          ['Doctors Quarter',76,56],
          ['Medical Record',58,66],
          ['Photocopy',68,76],
          ['Dorms',78,84],
          ['MSC Entrance',74,6],
          ['Kraft & Kettle',64,93]

        ]
      },

      2: {
        image: 'old-building-2nd-floor.png',
        destinations: [

          ['PICU',30,38],
          ['ICU',63,30],
          ['OR',82,15],
          ['Nurses Station',45,50],
          ['Waiting Area',25,72]

        ]
      },

      3: {
        image: 'old-building-3rd-floor.png',
        destinations: [

          ['Conference Room',30,45],
          ['Training Room',55,52],
          ['Meeting Area',72,44]

        ]
      }

    },

    new: {

      1:{
        image:'msc-map.png',
        destinations:[

          ['Canteen',21,24],
          ['Eye Surgi Center',22,36],
          ['ACES',23,50],
          ['Rehabilitation Center',43,36],
          ['Hemodialysis Center',40,50],
          ['Elevator',61,61],
          ['Sleep Lab',30,76],
          ['Cardiovascular Center',40,76],
          ['Med Express',50,76],
          ['Cashier Satellite',78,53],
          ['Kraft & Kettle',80,53],
          ['Cancer Center',93,74],
          ['Wound Care Center',76,76],
          ['PH Heart Office',84,76]

        ]
      },

      2:{
        image:'msc-2nd-floor.png',
        destinations:[
          ['DR Clinics',15,42],
          ['Elevator',64,45]
        ]
      },

      3:{
        image:'msc-3rd-floor.png',
        destinations:[
          ['Executive Office',25,45],
          ['Board Room',60,55]
        ]
      },

      4:{
        image:'msc-4th-floor.png',
        destinations:[
          ['Roof Deck',20,45],
          ['Executive Lounge',45,58]
        ]
      }

    }

  };

  function renderDestinations(){

    const data = floors[currentMap][currentFloor];

    if(!data) return;

    mapImage.src = data.image;

    destinations.innerHTML = '';

    data.destinations.forEach(item=>{

      const button = document.createElement('div');

      button.className = 'destination';

      button.innerText = item[0];

      button.onclick = ()=>{
        showWaypoint(item[1], item[2]);
      };

      destinations.appendChild(button);

    });
  }

  window.showWaypoint = function(x,y){

    marker.style.display = 'block';

    marker.style.left = x + '%';
    marker.style.top = y + '%';
  };

  window.changeFloor = function(floor){

    currentFloor = floor;

    if(currentMap === 'old' && floor === 4){
      currentFloor = 1;
    }

    const floor4Btn = document.getElementById('floor4');

    floor4Btn.style.display =
      currentMap === 'new'
      ? 'block'
      : 'none';

    marker.style.display = 'none';

    renderDestinations();
  };

  window.switchMap = function(){

    currentMap =
      currentMap === 'old'
      ? 'new'
      : 'old';

    if(currentMap === 'old' && currentFloor === 4){
      currentFloor = 1;
    }

    changeFloor(currentFloor);
  };

  renderDestinations();

  loader.style.display = 'none';

  document.addEventListener('DOMContentLoaded', ()=>{

});

</script>

</body>

<script>

const app = document.getElementById('app');

function scaleApp(){

  const baseWidth = 3840;
  const baseHeight = 2160;

  const scale = Math.min(
    window.innerWidth / baseWidth,
    window.innerHeight / baseHeight
  );

  app.style.transform = `scale(${scale})`;

  app.style.left =
    ((window.innerWidth - (baseWidth * scale)) / 2) + 'px';

  app.style.top =
    ((window.innerHeight - (baseHeight * scale)) / 2) + 'px';
}

scaleApp();

window.addEventListener('resize', scaleApp);

function showScreen(id){

  screens.forEach(screen=>{

  document.getElementById(id).classList.add('active');

    btn.className = 'destination';

    btn.innerText = item[0];

    btn.onclick = ()=>{

      marker.style.display = 'block';

      marker.style.top = item[2] + '%';
    };
