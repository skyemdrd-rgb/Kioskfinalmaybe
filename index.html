<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSC Kiosk Directory</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#edf1f5;
}

/* APP */

#app{
  position:absolute;
  width:3840px;
  height:2160px;
  transform-origin:top left;
  overflow:hidden;
}

/* LOADER */

#loader{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
  z-index:99999;
}

/* SCREEN */

.screen{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
}

.screen.active{
  opacity:1;
  pointer-events:auto;
}

/* BACKGROUND */

.background{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
}

/* HOTSPOTS */

.hotspot{
  position:absolute;
  cursor:pointer;
}

body.debug .hotspot{
  border:2px dashed red;
  background:rgba(255,0,0,.1);
}

/* HOME */

.home{
  left:14%;
  width:21.67%;
  height:23.67%;
  bottom:0;
}

.guide{
  left:38.3%;
  width:25.32%;
  height:23.67%;
  bottom:0;
}

.about{
  left:64.2%;
  width:24.32%;
  height:23.67%;
  bottom:0;
}

/* GUIDE */

.clinic{
  top:4%;
  left:6%;
  width:31%;
  height:22%;
}

.chaplain{
  top:4%;
  left:42%;
  width:30%;
  height:22%;
}

.resto{
  top:32%;
  left:40%;
  width:32%;
  height:18%;
}

.dept{
  top:55%;
  left:6%;
  width:31%;
  height:21%;
}

.mapBtn{
  bottom:3%;
  left:5%;
  width:67%;
  height:18%;
}

/* MAP */

.container{
  width:100%;
  height:100%;
  display:flex;
}

.sidebar{
  width:620px;
  background:white;
  overflow-y:auto;
  padding:24px;
}

.destination{
  background:white;
  border:2px solid #ddd;
  border-radius:28px;
  padding:28px;
  margin-bottom:20px;
  font-size:42px;
  font-weight:bold;
  cursor:pointer;
}

.destination:hover{
  background:#0d3b8f;
  color:white;
}

.map-area{
  flex:1;
  position:relative;
  padding:30px;
}

.map-container{
  width:100%;
  height:100%;
  background:white;
  border-radius:32px;
  overflow:hidden;
  position:relative;
}

.map-container img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.marker{
  position:absolute;
  width:28px;
  height:28px;
  background:red;
  border-radius:50%;
  border:5px solid white;
  transform:translate(-50%,-50%);
  display:none;
  z-index:50;
}

.floor-sidebar{
  position:absolute;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:20px;
}

.floor-btn{
  width:140px;
  height:140px;
  border:none;
  border-radius:28px;
  background:white;
  font-size:48px;
  font-weight:bold;
  color:#0d3b8f;
  cursor:pointer;
}

.top-bar{
  position:absolute;
  top:30px;
  right:30px;
  background:white;
  padding:20px;
  border-radius:40px;
  display:flex;
  align-items:center;
  gap:20px;
  z-index:10;
}

.switch-btn{
  border:none;
  background:#0d3b8f;
  color:white;
  padding:14px 20px;
  border-radius:18px;
  font-size:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="app">

<!-- HOME -->

<div id="homeScreen" class="screen active">

  <div class="background" style="background-image:url('./home.png')"></div>

  <div class="hotspot home" onclick="goHome()"></div>
  <div class="hotspot guide" onclick="goGuide()"></div>
  <div class="hotspot about" onclick="showScreen('aboutScreen')"></div>

</div>

<!-- ABOUT -->

<div id="aboutScreen" class="screen">

  <div class="background" style="background-image:url('./about.jpg')"></div>

</div>

<!-- GUIDE -->

<div id="guideScreen" class="screen">

  <div class="background" style="background-image:url('./guide.jpg')"></div>

  <div class="hotspot clinic"></div>
  <div class="hotspot chaplain"></div>
  <div class="hotspot resto"></div>
  <div class="hotspot dept"></div>

  <div class="hotspot mapBtn" onclick="showScreen('mapScreen')"></div>

</div>

<!-- MAP -->

<div id="mapScreen" class="screen">

  <div class="container">

    <div class="sidebar" id="destinations"></div>

    <div class="map-area">

      <div class="top-bar">

        <button class="switch-btn" onclick="goGuide()">
          Back
        </button>

        <button class="switch-btn" onclick="switchMap()">
          Switch Building
        </button>

      </div>

      <div class="map-container">

        <img id="mapImage" src="./msc-map.png">

        <div id="marker" class="marker"></div>

      </div>

      <div class="floor-sidebar">

        <button class="floor-btn" onclick="changeFloor(1)">
          1F
        </button>

        <button class="floor-btn" onclick="changeFloor(2)">
          2F
        </button>

        <button class="floor-btn" onclick="changeFloor(3)">
          3F
        </button>

        <button class="floor-btn" id="floor4" onclick="changeFloor(4)">
          4F
        </button>

      </div>

    </div>

  </div>

</div>

</div>

<script>

window.onerror = function(msg,url,line){
  console.log(msg,line);
};

const app = document.getElementById('app');
const loader = document.getElementById('loader');
const screens = document.querySelectorAll('.screen');

function scaleApp(){

  const baseWidth = 3840;
  const baseHeight = 2160;

  const scale = Math.min(
    window.innerWidth / baseWidth,
    window.innerHeight / baseHeight
  );

  app.style.transform = `scale(${scale})`;

  app.style.left =
    ((window.innerWidth - (baseWidth * scale)) / 2) + 'px';

  app.style.top =
    ((window.innerHeight - (baseHeight * scale)) / 2) + 'px';
}

window.addEventListener('resize', scaleApp);

scaleApp();

function showScreen(id){

  screens.forEach(screen=>{
    screen.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
}

function goHome(){
  showScreen('homeScreen');
}

function goGuide(){
  showScreen('guideScreen');
}

const mapImage = document.getElementById('mapImage');
const marker = document.getElementById('marker');
const destinations = document.getElementById('destinations');

let currentMap = 'new';
let currentFloor = 1;

const floors = {

  old:{

    1:{
      image:'./old-building-map.png',
      destinations:[

        ['Dietary',34,31],
        ['Purchasing Office',39,10],
        ['ER',14,74],
        ['OPD',22,87],
        ['Laboratory',42,49],
        ['Pharmacy',49,76]

      ]
    },

    2:{
      image:'./old-building-2nd-floor.png',
      destinations:[

        ['PICU',30,38],
        ['ICU',63,30],
        ['OR',82,15]

      ]
    },

    3:{
      image:'./old-building-3rd-floor.png',
      destinations:[

        ['Conference Room',30,45]

      ]
    }

  },

  new:{

    1:{
      image:'./msc-map.png',
      destinations:[

        ['Canteen',21,24],
        ['Eye Surgi Center',22,36],
        ['ACES',23,50],
        ['Cancer Center',93,74]

      ]
    },

    2:{
      image:'./msc-2nd-floor.png',
      destinations:[

        ['DR Clinics',15,42]

      ]
    },

    3:{
      image:'./msc-3rd-floor.png',
      destinations:[

        ['Executive Office',25,45]

      ]
    },

    4:{
      image:'./msc-4th-floor.png',
      destinations:[

        ['Roof Deck',20,45]

      ]
    }

  }

};

function renderDestinations(){

  const data = floors[currentMap][currentFloor];

  if(!data) return;

  mapImage.src = data.image;

  destinations.innerHTML = '';

  data.destinations.forEach(item=>{

    const btn = document.createElement('div');

    btn.className = 'destination';

    btn.innerText = item[0];

    btn.onclick = ()=>{

      marker.style.display = 'block';

      marker.style.left = item[1] + '%';
      marker.style.top = item[2] + '%';
    };

    destinations.appendChild(btn);

  });
}

function changeFloor(floor){

  currentFloor = floor;

  if(currentMap === 'old' && currentFloor === 4){
    currentFloor = 1;
  }

  document.getElementById('floor4').style.display =
    currentMap === 'new'
    ? 'block'
    : 'none';

  marker.style.display = 'none';

  renderDestinations();
}

function switchMap(){

  currentMap =
    currentMap === 'old'
    ? 'new'
    : 'old';

  if(currentMap === 'old' && currentFloor === 4){
    currentFloor = 1;
  }

  renderDestinations();
}

renderDestinations();

window.onload = function(){
  loader.style.display = 'none';
};

setTimeout(()=>{
  loader.style.display = 'none';
},3000);

</script>

</body>
